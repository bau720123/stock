<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>即時報價</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+TC:wght@400;500;700&display=swap');

  :root {
    --bg:       #0a0e14;
    --surface:  #111620;
    --border:   #1e2736;
    --muted:    #3a4a5c;
    --text:     #c8d8e8;
    --dim:      #5a7080;
    --up:       #00c98a;
    --down:     #ff4d6a;
    --neutral:  #5a9eff;
    --accent:   #f0b429;
    --mono:     'IBM Plex Mono', monospace;
    --sans:     'Noto Sans TC', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 80px 16px 48px;
  }

  /* ── Header ── */
  header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: var(--bg);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 16px 16px;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-family: var(--mono);
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
  }
  #clock {
    font-family: var(--mono);
    font-size: .8rem;
    color: var(--dim);
    letter-spacing: .06em;
  }

  /* ── Refresh button ── */
  #refreshBtn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: none;
    border: 1px solid var(--muted);
    /* color: var(--dim); */
    color: aqua;
    font-family: var(--mono);
    font-size: .75rem;
    letter-spacing: .08em;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: border-color .2s, color .2s;
    border-color: aqua;
    background-color: black;
  }
  #refreshBtn:hover { border-color: var(--accent); color: var(--accent); }
  #refreshBtn.spinning svg { animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Grid layout ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity .4s ease, transform .4s ease, border-color .2s;
  }
  .card.loaded { opacity: 1; transform: translateY(0); }
  .card:hover { border-color: var(--muted); }

  /* left accent bar */
  .card::before {
    content: '';
    position: absolute;
    left: 0; top: 16px; bottom: 16px;
    width: 3px;
    border-radius: 0 2px 2px 0;
    background: var(--neutral);
  }
  /* .card.up::before   { background: var(--up); }
  .card.down::before { background: var(--down); } */
  .card.up::before   { background: var(--neutral); }
  .card.down::before { background: var(--neutral); }

  .card-title {
    font-family: var(--mono);
    font-size: .7rem;
    letter-spacing: .14em;
    text-transform: uppercase;
    /* color: var(--dim); */
    margin-bottom: 14px;
  }

  /* ── Rows inside card ── */
  .row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
  }
  .row:last-child { border-bottom: none; }
  .row-label {
    font-size: .78rem;
    color: var(--dim);
  }
  .row-value {
    font-family: var(--mono);
    font-size: .88rem;
    color: var(--text);
  }
  .row-value.up   { color: var(--up); }
  .row-value.down { color: var(--down); }
  .row-value.accent { color: var(--accent); font-size: 1.1rem; font-weight: 600; }
  
  .group-header {
    font-size: 0.82rem;
    font-weight: 700;
    /* color: var(--text); */
    color: tan;
    margin: 14px 0 6px;
    display: block;
  }

  /* ── Section label ── */
  .section-label {
    font-family: var(--mono);
    font-size: .65rem;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 20px 0 10px;
  }

  /* ── Loading skeleton ── */
  .skeleton {
    height: 14px;
    background: linear-gradient(90deg, var(--border) 25%, var(--muted) 50%, var(--border) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 3px;
    margin: 8px 0;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }

  /* ── Error state ── */
  .error-text {
    font-family: var(--mono);
    font-size: .75rem;
    color: var(--down);
    opacity: .7;
  }

  /* ── Update time ── */
  .update-time {
    font-family: var(--mono);
    font-size: .68rem;
    color: var(--muted);
    margin-top: 12px;
    text-align: right;
  }

  /* ── CNBC card spans full width on wide screens ── */
  .card-wide {
    grid-column: 1 / -1;
  }
  @media (max-width: 680px) {
    .card-wide { grid-column: auto; }
  }
</style>
</head>
<body>

<header>
  <h1>&#9632; 即時報價</h1>
  <div style="display:flex;align-items:center;gap:16px;">
    <span id="clock">--:--:--</span>
    <button id="refreshBtn" onclick="loadAll()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      重新整理
    </button>
  </div>
</header>

<div class="grid" id="grid">
  <div class="card" id="card-taifex"><div class="card-title">台積電期貨</div><div class="skeleton"></div></div>
  <div class="card" id="card-fitx"><div class="card-title">台股期貨</div><div class="skeleton"></div></div>
  <div class="card" id="card-twn"><div class="card-title">富台指</div><div class="skeleton"></div></div>
  <div class="card" id="card-brent"><div class="card-title">布蘭特原油</div><div class="skeleton"></div></div>
  <div class="card" id="card-cnbc"><div class="card-title">美股市場概況</div><div class="skeleton"></div><div class="skeleton"></div></div>
  <div class="card" id="card-rh"><div class="card-title">台積電 ADR</div><div class="skeleton"></div></div>
</div>

<script>
const WORKER = "https://billowing-queen-4a58.bau720123.workers.dev";
let tsmCnbcData = null; // 用於跨卡片共享資料

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('zh-TW', { hour24: false });
}
setInterval(updateClock, 1000);
updateClock();

function changeClass(val, reverse = 0) {
  if (!val) return '';
  const s = String(val);
  
  let isUp = s.includes('▲') || s.includes('+') || s > 0;
  let isDown = s.includes('▼') || s.includes('-') || s < 0;

  if (!isUp && !isDown) return '';

  // 如果 reverse 為 1，則將 isUp 與 isDown 對調
  if (reverse === 1) {
    [isUp, isDown] = [isDown, isUp];
  }

  return isUp ? 'up' : 'down';
}

function formatChange(val) {
  if (typeof val === 'number') return (val > 0 ? '+' : '') + val.toFixed(2);
  return val;
}

function row(label, value, cls = '') {
  return `<div class="row"><span class="row-label">${label}</span><span class="row-value ${cls}">${value}</span></div>`;
}

function setCard(id, updown, html) {
  const card = document.getElementById(id);
  card.className = 'card ' + (updown > 0 ? 'up' : updown < 0 ? 'down' : '');
  card.innerHTML = html;
  setTimeout(() => card.classList.add('loaded'), 20);
}

// ── 1. 美股市場：合併盤前與四大指數 ──
async function loadCnbc() {
  const d = await fetch(WORKER + '/cnbc').then(r => r.json());
  if (!d.success) return;

  const { market: m, fairValue: fv } = d;
  tsmCnbcData = m; // 存下台積電的部分給 loadRH

  let html = `<div class="card-title">美股市場概況</div>`;
  
  html += `<span class="group-header">【美股盤前電子盤】</span>`;
  html += row('道瓊期貨', formatChange(fv.dow), changeClass(fv.dow));
  html += row('標普500期貨', formatChange(fv.sp), changeClass(fv.sp));
  html += row('納斯達克100期貨', formatChange(fv.nasdaq), changeClass(fv.nasdaq));
  html += row('羅素2000期貨', formatChange(fv.russell), changeClass(fv.russell));

  html += `<span class="group-header">【美股四大指數】</span>`;
  html += row('道瓊工業指數', m.dji, changeClass(m.dji));
  html += row('標普500指數', m.sp500, changeClass(m.sp500));
  html += row('納斯達克指數', m.ixic, changeClass(m.ixic));
  html += row('費城半導體指數', m.sox, changeClass(m.sox));

  // html += `<div class="update-time">${fv.updateTime}</div>`;
  setCard('card-cnbc', 0, html);
}

// ── 2. 台積電 ADR：合併 CNBC 與 RobinHood ──
async function loadRH() {
  const d = await fetch(WORKER + '/rh').then(r => r.json());
  let html = `<div class="card-title">台積電 ADR</div>`;
  
  // A. CNBC 來源 (包含開盤、最高、最低)
  if (tsmCnbcData) {
    const m = tsmCnbcData;
    html += `<span class="group-header">CNBC</span>`;
    // const preLabel = (m.tsmType === 'PRE_MKT' || m.tsmType === 'POST_MKT_PREV') ? '盤前變動' : '盤後變動';

    if (m.tsmType === 'PRE_MKT' || m.tsmType === 'POST_MKT_PREV') {
        html += row('盤前變動', m.tsmMarket || '--', changeClass(m.tsmMarket));
    }

    // html += row(preLabel, m.tsmMarket || '--', changeClass(m.tsmMarket));
    html += row('盤中或收盤變動', m.tsmRegular || '--', changeClass(m.tsmRegular));

    if (m.tsmType === 'POST_MKT') {
        html += row('盤後變動', m.tsmMarket || '--', changeClass(m.tsmMarket));
    }
  }

  // B. RobinHood 來源
  if (d.success) {
    html += `<span class="group-header">RobinHood</span>`;
    html += row('即時變動', d.changeText, changeClass(d.changeText));
    html += row('額外資訊', d.tertiaryText, changeClass(d.tertiaryText));
  }

  const cls = d.success ? changeClass(d.changeText) : '';
  setCard('card-rh', cls === 'up' ? 1 : cls === 'down' ? -1 : 0, html);
}

// ── 其他功能（完全保留原始邏輯） ──
async function loadTaifex() {
  const d = await fetch(WORKER + '/taifex').then(r => r.json());
  const title = '<div class="card-title">台積電期貨</div>';
  if (!d.success || d.price === 0) {
    setCard('card-taifex', 0, title + '<div class="error-text">無法取得資料</div>');
    return;
  }
  const updown = d.updown;
  const sign = updown > 0 ? '▲' : updown < 0 ? '▼' : '';
  // const cls = changeClass(updown);
  var cls = 'up';
  if (updown > 0) {
        cls = 'down';
  }
  setCard('card-taifex', updown,
    title +
    row('現價', d.price.toFixed(1), 'accent') +
    row('漲跌', sign + Math.abs(updown).toFixed(0), cls)
  );
}

async function loadHiStock(no, cardId, label, reverse = 0) {
  const d = await fetch(`${WORKER}/${no}`).then(r => r.json());
  const title = `<div class="card-title">${label}</div>`;
  
  if (!d.success) {
    setCard(cardId, 0, title + '<div class="error-text">無法取得資料</div>');
    return;
  }

  // 1. 根據 reverse 決定顏色 Class
  const cls = changeClass(d.changeText, 1);
  
  // 2. 判斷原始漲跌趨勢 (1=上漲, -1=下跌)
  const updown = d.changeText.startsWith('▲') ? 1 : d.changeText.startsWith('▼') ? -1 : 0;

  // 3. 處理時間格式：將 . 取代為 -
  const formattedTime = d.updateTime.replace(/\./g, '-');

  setCard(cardId, updown,
    title +
    row('開盤', d.open.toFixed(0)) +
    row('最高', d.high.toFixed(0)) +
    row('最低', d.low.toFixed(0)) +
    row('漲跌', d.changeText, cls) +
    row('成交', d.current.toFixed(0), 'accent') +
    row('更新時間', formattedTime)
  );
}

async function loadBrent() {
  const d = await fetch(WORKER + '/brent').then(r => r.json());
  if (!d.success) return;
  let html = `<div class="card-title">布蘭特原油</div>`;
  html += row('價格（USD）', d.price.toFixed(2), 'accent');
  setCard('card-brent', 0, html);
}

async function loadAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');

  // 重置為 skeleton
  document.querySelectorAll('.card').forEach(c => {
    c.className = 'card';
    // c.innerHTML = c.querySelector('.card-title')?.outerHTML ||
    //   '<div class="skeleton"></div>';
    // const sk = document.createElement('div');
    // sk.className = 'skeleton';
    // sk.style.width = '60%';
    // c.appendChild(sk);
  });

  // 1. 先跑 CNBC 以取得 TSM 資料
  await loadCnbc();

  // 2. 跑其餘 API
  await Promise.allSettled([
    loadRH(),
    loadTaifex(),
    loadHiStock('fitx', 'card-fitx', '台股期貨'),
    loadHiStock('twn', 'card-twn', '富台指'),
    loadBrent()
  ]);

  btn.classList.remove('spinning');
}

window.onload = loadAll;
</script>
</body>
</html>
