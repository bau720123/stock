      <li><a onclick="closeMenu()" href="?card_type=america-market">🏛️ 美股市場概況</a></li>

      <li><a style="cursor:pointer;" onclick="showInfo('一個以純前端技術為核心，搭配 Cloudflare 無伺服器架構，實現即時金融市場報價、PWA 安裝與主動推播通知的個人投資輔助工具。');">ℹ️ 關於本軟體</a></li>

  <header id="header">
    <h1 onclick="openMenu()" style="cursor:pointer;">☰ 即時報價</h1>
    <div style="display:flex;align-items:center;gap:16px;">
      <!-- <span id="clock">--:--:--</span> -->
      <button id="refreshBtn" onclick="loadAll()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M23 4v6h-6" />
          <path d="M1 20v-6h6" />
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
        </svg>
        <!-- 重新整理 --><span id="countdown">300</span>
      </button>
      <button id="subscribeUser" onclick="subscribeUser()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" id="subscribeIcon">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
          <path d="M13.73 21a2 2 0 0 1-3.46 0" />
        </svg>
        <!-- 訂閱通知 --><span id="">&nbsp;</span>
      </button>
    </div>
  </header>

    </div>
    <div class="card" id="card-sentiment" style="display: none;">
