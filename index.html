<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>即時報價</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+TC:wght@400;500;700&display=swap');

  :root {
    --bg:       #0a0e14;
    --surface:  #111620;
    --border:   #1e2736;
    --muted:    #3a4a5c;
    --text:     #c8d8e8;
    --dim:      #5a7080;
    --up:       #00c98a;
    --down:     #ff4d6a;
    --neutral:  #5a9eff;
    --accent:   #f0b429;
    --mono:     'IBM Plex Mono', monospace;
    --sans:     'Noto Sans TC', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 80px 16px 48px;
  }

  /* ── Header ── */
  header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: var(--bg);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 16px 16px;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-family: var(--mono);
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
  }
  #clock {
    font-family: var(--mono);
    font-size: .8rem;
    color: var(--dim);
    letter-spacing: .06em;
  }

  /* ── Refresh button ── */
  #refreshBtn, #subscribeUser {
    display: flex;
    align-items: center;
    gap: 8px;
    background: none;
    border: 1px solid var(--muted);
    /* color: var(--dim); */
    color: aqua;
    font-family: var(--mono);
    font-size: .75rem;
    letter-spacing: .08em;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: border-color .2s, color .2s;
    border-color: aqua;
    background-color: black;
  }
  #refreshBtn:hover, #subscribeUser:hover { border-color: var(--accent); color: var(--accent); }
  #refreshBtn.spinning svg { animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Grid layout ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity .4s ease, transform .4s ease, border-color .2s;
  }
  .card.loaded { opacity: 1; transform: translateY(0); }
  .card:hover { border-color: var(--muted); }

  /* left accent bar */
  .card::before {
    content: '';
    position: absolute;
    left: 0; top: 16px; bottom: 16px;
    width: 3px;
    border-radius: 0 2px 2px 0;
    background: var(--neutral);
  }
  /* .card.up::before   { background: var(--up); }
  .card.down::before { background: var(--down); } */
  .card.up::before   { background: var(--neutral); }
  .card.down::before { background: var(--neutral); }

  .card-title {
    font-family: var(--mono);
    font-size: .7rem;
    letter-spacing: .14em;
    text-transform: uppercase;
    /* color: var(--dim); */
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-title-text { flex: 1; }

  /* ── Rows inside card ── */
  .row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
  }
  .row:last-child { border-bottom: none; }
  .row-label {
    font-size: .78rem;
    color: var(--dim);
  }
  .row-value {
    font-family: var(--mono);
    font-size: .88rem;
    color: var(--text);
  }
  .row-value.up   { color: var(--up); }
  .row-value.down { color: var(--down); }
  .row-value.accent { color: var(--accent); font-size: 1.1rem; font-weight: 600; }
  
  .group-header {
    font-size: 0.82rem;
    font-weight: 700;
    /* color: var(--text); */
    color: tan;
    margin: 14px 0 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .group-header-title {
    flex: 1;
  }
  .alert-settings-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: 1px solid var(--muted);
    border-radius: 4px;
    /* color: var(--muted); */
    color: ghostwhite;
    cursor: pointer;
    padding: 2px 5px;
    transition: border-color .2s, color .2s;
    line-height: 1;
    cursor: pointer;
  }
  .alert-settings-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .alert-settings-btn.active {
    /* border-color: var(--up); */
    /* color: var(--up); */
    border-color: darkgray;
    color: ghostwhite;
  }

  /* ── Section label ── */
  .section-label {
    font-family: var(--mono);
    font-size: .65rem;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 20px 0 10px;
  }

  /* ── Loading skeleton ── */
  .skeleton {
    height: 14px;
    background: linear-gradient(90deg, var(--border) 25%, var(--muted) 50%, var(--border) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 3px;
    margin: 8px 0;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }

  /* ── Error state ── */
  .error-text {
    font-family: var(--mono);
    font-size: 1rem;
    color: var(--down);
    opacity: .7;
  }

  /* ── Update time ── */
  .update-time {
    font-family: var(--mono);
    font-size: .68rem;
    color: var(--muted);
    margin-top: 12px;
    text-align: right;
  }

  /* ── CNBC card spans full width on wide screens ── */
  .card-wide {
    grid-column: 1 / -1;
  }
  @media (max-width: 680px) {
    .card-wide { grid-column: auto; }
  }

/* ── Slide Menu ── */
#menuOverlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  z-index: 200;
}
#menuOverlay.active { display: block; }

#slideMenu {
  position: fixed;
  top: 0;
  left: -280px;
  width: 280px;
  height: 100vh;
  background: var(--surface);
  border-right: 1px solid var(--border);
  z-index: 300;
  transition: left .3s ease;
  overflow-y: auto;
}
#slideMenu.active { left: 0; }

#menuHeader {
  font-family: var(--mono);
  font-size: 1rem;
  font-weight: 600;
  color: var(--accent);
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  letter-spacing: .12em;
}

#menuList {
  list-style: none;
  padding: 12px 0;
}
#menuList li a {
  display: block;
  padding: 12px 20px;
  color: var(--text);
  text-decoration: none;
  font-size: .88rem;
  transition: background .15s, color .15s;
}
#menuList li a:hover {
  background: var(--border);
  color: var(--accent);
}
</style>

<link rel="manifest" href="/stock/manifest.json">
<meta name="theme-color" content="#0a0e14">
<meta name="mobile-web-app-capable" content="yes"> <!-- Android Chrome -->
<meta name="apple-mobile-web-app-capable" content="yes"> <!-- iOS Safari，舊版仍需要 -->

</head>
<body>

<!-- Overlay 背景遮罩 -->
<div id="menuOverlay" onclick="closeMenu()"></div>

<!-- Slide Menu -->
<nav id="slideMenu">
  <div id="menuHeader" onclick="closeMenu()" style="cursor:pointer;">☰ 即時報價</div>
  <ul id="menuList">
    <li><a href="?card_type=taiwan-market">📈 台股市場概況</a></li>
    <li><a href="?card_type=world-indices">🏛️ 美股市場概況</a></li>
    <li><a href="?card_type=materials">🛢️ 原物料市場</a></li>

<header>
  <h1 onclick="openMenu()" style="cursor:pointer;">☰ 即時報價</h1>
  <div style="display:flex;align-items:center;gap:16px;">
    <!-- <span id="clock">--:--:--</span> -->
    <button id="refreshBtn" onclick="loadAll()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      <!--重新整理 --><span id="countdown">300</span>
    </button>
    <button id="subscribeUser" onclick="subscribeUser()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" id="subscribeIcon">

<div class="grid" id="grid">
  <div class="card" id="card-tw" style="display: none;"><div class="card-title">台股市場概況</div><div class="skeleton"></div><div class="skeleton"></div></div>
  <div class="card" id="card-cnbc" style="display: none;"><div class="card-title">美股市場概況</div><div class="skeleton"></div><div class="skeleton"></div></div>
  <div class="card" id="card-commodity" style="display: none;"><div class="card-title">原物料市場</div><div class="skeleton"></div></div>
  <div class="card" id="card-sentiment" style="display: none;"><div class="card-title">市場情緒</div><div class="skeleton"></div></div>
  <div class="card" id="card-mystock" style="display: none;"><div class="card-title">我的自選股票</div><div class="skeleton"></div><div class="skeleton"></div></div>
</div>

<script>

// 警示閾值 localStorage 工具
const ALERT_PREFIX = 'alert_';

function alertGet(key) {
  const val = localStorage.getItem(ALERT_PREFIX + key);
  return val !== null ? parseFloat(val) : null;
}

function alertSet(key, value) {
  if (value === '' || value === null || isNaN(value)) {
    localStorage.removeItem(ALERT_PREFIX + key);
  } else {
    localStorage.setItem(ALERT_PREFIX + key, String(value));
  }
}

function alertEnabled(key) {
  return alertGet(key) !== null;
}

// group-header HTML 產生器（含偵測設定按鈕）
// settingsKey：若傳入則顯示齒輪按鈕，點擊呼叫 openAlertSettings(settingsKey)
function groupHeader(label, settingsKey = null, wording = '') {
  const isActive = settingsKey && (alertEnabled(settingsKey + '_high') || alertEnabled(settingsKey + '_low') || alertEnabled(settingsKey));
  var descButton = wording ? `
    <button onclick="showInfo('${wording}')" title="內容說明" class="alert-settings-btn active">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
        <line x1="12" y1="17" x2="12.01" y2="17"></line>
      </svg>
    </button>` : '';
  
  var space = '';
  if (settingsKey != '') {
    space = '&nbsp;';
  }

  var settingsButton = settingsKey ? `
    <button class="alert-settings-btn ${isActive ? 'active' : ''}"
      title="偵測設定"
      onclick="openAlertSettings('${settingsKey}')">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>` : '';
  return `<span class="group-header"><span class="group-header-title">${label}</span>${descButton}${space}${settingsButton}</span>`;
}

// 偵測設定彈窗
// config 格式：{ title, fields: [{ key, label, placeholder, unit }] }
// 自選股票清單：從 localStorage 讀取，fallback 到預設值
const MY_STOCKS_DEFAULT = [
  { symbol: '2330', name: '台積電' },
  { symbol: '2308', name: '台達電' },
  { symbol: '2317', name: '鴻海' },
];

function loadMyStocksList() {
  try {
    const saved = localStorage.getItem('my_stocks_list');
    if (saved) {
      const parsed = JSON.parse(saved);
      if (Array.isArray(parsed) && parsed.length > 0) return parsed;
    }
  } catch (e) { console.error('讀取自選股票清單失敗，使用預設值', e); }
  return MY_STOCKS_DEFAULT;
}

function saveMyStocksList(list) {
  localStorage.setItem('my_stocks_list', JSON.stringify(list));
}

let MY_STOCKS = loadMyStocksList();

const ALERT_CONFIGS = {
  tsmc: {
    title: '台積電 偵測設定',
    fields: [
      { key: 'tsmc_high', label: '價格高於此值時通知', placeholder: '例：2000', unit: 'TWD' },
      { key: 'tsmc_low',  label: '價格低於此值時通知', placeholder: '例：1800',  unit: 'TWD' },
    ]
  },
  brent: {
    title: '布蘭特原油 偵測設定',
    fields: [
      { key: 'brent_high', label: '價格高於此值時通知', placeholder: '例：100', unit: 'USD' },
      { key: 'brent_low',  label: '價格低於此值時通知', placeholder: '例：95',  unit: 'USD' },
    ]
  },
  usdollar: {
    title: '美元指數 偵測設定',
    fields: [
      { key: 'usdollar_high', label: '價格高於此值時通知', placeholder: '例：100', unit: '' },
      { key: 'usdollar_low',  label: '價格低於此值時通知', placeholder: '例：99',  unit: '' },
    ]
  },
  vix: {
    title: 'VIX 恐慌指數 偵測設定',
    fields: [
      { key: 'vix_high', label: '指數高於此值時通知', placeholder: '例：30', unit: '' },
      { key: 'vix_low',  label: '指數低於此值時通知', placeholder: '例：25', unit: '' },
    ]
  }
};

// 動態注入自選股票的警示設定
for (const stock of MY_STOCKS) {
  ALERT_CONFIGS[`mystock_${stock.symbol}`] = {
    title: `${stock.name}（${stock.symbol}）偵測設定`,
    fields: [
      { key: `mystock_${stock.symbol}_high`, label: '價格高於此值時通知', placeholder: '例：1000', unit: 'TWD' },
      { key: `mystock_${stock.symbol}_low`,  label: '價格低於此值時通知', placeholder: '例：800',  unit: 'TWD' },
    ]
  };
}

// 自選股票清單管理介面
async function openMyStockSettings() {
  // 每次開啟都讀取最新的清單
  let editList = loadMyStocksList().map(s => ({ ...s }));

  // 移動前先把 DOM 當下的輸入值同步回 editList，避免重繪時內容遺失
  function syncFromDom() {
    editList.forEach((_, i) => {
      const sym  = document.getElementById(`mystock-symbol-${i}`);
      const name = document.getElementById(`mystock-name-${i}`);
      if (sym)  editList[i].symbol = sym.value.trim();
      if (name) editList[i].name   = name.value.trim();
    });
  }

  const btnBase = `background:none; border:1px solid #3a4a5c; border-radius:4px; color:#5a7080; cursor:pointer; padding:5px 7px; font-size:.8rem; flex-shrink:0; line-height:1;`;

  function renderRows() {
    const last = editList.length - 1;
    return editList.map((s, i) => `
      <div id="mystock-row-${i}" style="display:flex; align-items:center; gap:6px; margin-bottom:8px;">
        <input
          id="mystock-symbol-${i}"
          type="text"
          maxlength="10"
          placeholder="股票代號"
          value="${s.symbol}"
          style="width:6em; background:#1a2130; border:1px solid #2e3f52; border-radius:4px; color:#c8d8e8; font-size:.85rem; padding:6px 8px; outline:none; font-family:var(--mono);"
        />
        <input
          id="mystock-name-${i}"
          type="text"
          maxlength="20"
          placeholder="股票名稱"
          value="${s.name}"
          style="width:6em; flex:1; background:#1a2130; border:1px solid #2e3f52; border-radius:4px; color:#c8d8e8; font-size:.85rem; padding:6px 8px; outline:none;"
        />
        <button type="button" onclick="mystockMoveRow(${i},-1)"
          ${i === 0 ? 'disabled style="' + btnBase + ' opacity:.25; cursor:default;"' : 'style="' + btnBase + '"'}
          onmouseover="if(!this.disabled){this.style.borderColor='#5a9eff';this.style.color='#5a9eff';}"
          onmouseout="this.style.borderColor='#3a4a5c';this.style.color='#5a7080';"
        >▲</button>
        <button type="button" onclick="mystockMoveRow(${i},1)"
          ${i === last ? 'disabled style="' + btnBase + ' opacity:.25; cursor:default;"' : 'style="' + btnBase + '"'}
          onmouseover="if(!this.disabled){this.style.borderColor='#5a9eff';this.style.color='#5a9eff';}"
          onmouseout="this.style.borderColor='#3a4a5c';this.style.color='#5a7080';"
        >▼</button>
        <button type="button" onclick="mystockRemoveRow(${i})"
          style="${btnBase}"
          onmouseover="this.style.borderColor='#ff4d6a'; this.style.color='#ff4d6a';"
          onmouseout="this.style.borderColor='#3a4a5c'; this.style.color='#5a7080';"
        >－</button>
      </div>`).join('');
  }

  function getHtml() {
    return `
      <div style="font-size:.75rem; color:#5a7080; margin-bottom:12px; text-align:left;">
        股票代號（2330）與股票名稱（台積電）可自行輸入，儲存後立即生效
      </div>
      <div id="mystock-rows">${renderRows()}</div>
      <button
        type="button"
        id="mystock-add-btn"
        onclick="mystockAddRow()"
        style="margin-top:4px; background:none; border:1px solid #3a4a5c; border-radius:4px; color:#5a7080; cursor:pointer; padding:6px 16px; font-size:.8rem; width:100%;"
        onmouseover="this.style.borderColor='#00c98a'; this.style.color='#00c98a';"
        onmouseout="this.style.borderColor='#3a4a5c'; this.style.color='#5a7080';"
      >＋ 新增</button>`;
  }

  // 掛到 window 讓 inline onclick 可以呼叫
  window.mystockAddRow = function() {
    syncFromDom();
    editList.push({ symbol: '', name: '' });
    document.getElementById('mystock-rows').innerHTML = renderRows();
  };

  window.mystockRemoveRow = function(idx) {
    syncFromDom();
    editList.splice(idx, 1);
    document.getElementById('mystock-rows').innerHTML = renderRows();
  };

  window.mystockMoveRow = function(idx, dir) {
    syncFromDom();
    const target = idx + dir;
    if (target < 0 || target >= editList.length) return;
    [editList[idx], editList[target]] = [editList[target], editList[idx]];
    document.getElementById('mystock-rows').innerHTML = renderRows();
  };

  const result = await Swal.fire({
    title: '自選股票清單管理',
    html: getHtml(),
    background: '#111620',
    color: '#c8d8e8',
    confirmButtonText: '儲存',
    confirmButtonColor: '#0d6efd',
    cancelButtonText: '取消',
    showCancelButton: true,
    cancelButtonColor: '#3a4a5c',
    focusConfirm: false,
    preConfirm: () => {
      // 從 DOM 讀取最新輸入值
      const rows = document.querySelectorAll('[id^="mystock-row-"]');
      const list = [];
      rows.forEach((_, i) => {
        const symbol = (document.getElementById(`mystock-symbol-${i}`)?.value || '').trim().toUpperCase();
        const name   = (document.getElementById(`mystock-name-${i}`)?.value  || '').trim();
        if (symbol) list.push({ symbol, name: name || symbol });
      });
      if (list.length === 0) {
        Swal.showValidationMessage('請至少保留一檔股票');
        return false;
      }
      return list;
    }

// VAPID 公鑰轉換工具函數
function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
}

function changeClass(val, reverse = 0) {
  if (!val) return '';
  const s = String(val);
  
  let isUp = s.includes('▲') || s.includes('+') || s > 0;
  let isDown = s.includes('▼') || s.includes('-') || s < 0;

  if (!isUp && !isDown) return '';

  // 如果 reverse 為 1，則將 isUp 與 isDown 對調
  if (reverse === 1) {
    [isUp, isDown] = [isDown, isUp];
  }

  return isUp ? 'up' : 'down';
}

function formatChange(val) {
  if (typeof val === 'number') return (val > 0 ? '+' : '') + val.toFixed(2);
  return val;
}

const REFRESH_INTERVAL = 300; // 秒，改這個就通吃
let _countdownTimer = null;

function startCountdown() {
  clearInterval(_countdownTimer);
  let count = REFRESH_INTERVAL;
  document.getElementById('countdown').textContent = count;

  _countdownTimer = setInterval(() => {
    count--;
    document.getElementById('countdown').textContent = count;
    if (count <= 0) {
      clearInterval(_countdownTimer);
      loadAll();
    }
  }, 1000);
}

async function writeLogs(tag, message) {
  try {
    await fetch(`${WORKER}/write-logs`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tag, message })
    });
  } catch (e) {
    // log 失敗不影響主流程
  }
}

function showSweetAlert(icon = 'info', title = '', text = '') {
  Swal.fire({
    icon: icon,
    title: title,
    text: text,
    confirmButtonText: '確定',
    confirmButtonColor: '#0d6efd'
  });
}

function openMenu() {
  document.getElementById('slideMenu').classList.add('active');
  document.getElementById('menuOverlay').classList.add('active');
  document.body.style.overflow = 'hidden'; // ← 禁止 body 滾動
}

function closeMenu() {
  document.getElementById('slideMenu').classList.remove('active');
  document.getElementById('menuOverlay').classList.remove('active');
  document.body.style.overflow = ''; // ← 恢復 body 滾動
}
