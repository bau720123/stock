<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>即時報價</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+TC:wght@400;500;700&display=swap');

  :root {
    --bg:       #0a0e14;
    --surface:  #111620;
    --border:   #1e2736;
    --muted:    #3a4a5c;
    --text:     #c8d8e8;
    --dim:      #5a7080;
    --up:       #00c98a;
    --down:     #ff4d6a;
    --neutral:  #5a9eff;
    --accent:   #f0b429;
    --mono:     'IBM Plex Mono', monospace;
    --sans:     'Noto Sans TC', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 80px 16px 48px;
  }

  /* ── Header ── */
  header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: var(--bg);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 16px 16px;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-family: var(--mono);
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
  }
  #clock {
    font-family: var(--mono);
    font-size: .8rem;
    color: var(--dim);
    letter-spacing: .06em;
  }

  /* ── Refresh button ── */
  #refreshBtn, #subscribeUser {
    display: flex;
    align-items: center;
    gap: 8px;
    background: none;
    border: 1px solid var(--muted);
    /* color: var(--dim); */
    color: aqua;
    font-family: var(--mono);
    font-size: .75rem;
    letter-spacing: .08em;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: border-color .2s, color .2s;
    border-color: aqua;
    background-color: black;
  }
  #refreshBtn:hover, #subscribeUser:hover { border-color: var(--accent); color: var(--accent); }
  #refreshBtn.spinning svg { animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Grid layout ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity .4s ease, transform .4s ease, border-color .2s;
  }
  .card.loaded { opacity: 1; transform: translateY(0); }
  .card:hover { border-color: var(--muted); }

  /* left accent bar */
  .card::before {
    content: '';
    position: absolute;
    left: 0; top: 16px; bottom: 16px;
    width: 3px;
    border-radius: 0 2px 2px 0;
    background: var(--neutral);
  }
  /* .card.up::before   { background: var(--up); }
  .card.down::before { background: var(--down); } */
  .card.up::before   { background: var(--neutral); }
  .card.down::before { background: var(--neutral); }

  .card-title {
    font-family: var(--mono);
    font-size: .7rem;
    letter-spacing: .14em;
    text-transform: uppercase;
    /* color: var(--dim); */
    margin-bottom: 14px;
  }

  /* ── Rows inside card ── */
  .row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
  }
  .row:last-child { border-bottom: none; }
  .row-label {
    font-size: .78rem;
    color: var(--dim);
  }
  .row-value {
    font-family: var(--mono);
    font-size: .88rem;
    color: var(--text);
  }
  .row-value.up   { color: var(--up); }
  .row-value.down { color: var(--down); }
  .row-value.accent { color: var(--accent); font-size: 1.1rem; font-weight: 600; }
  
  .group-header {
    font-size: 0.82rem;
    font-weight: 700;
    /* color: var(--text); */
    color: tan;
    margin: 14px 0 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .group-header-title {
    flex: 1;
  }
  .alert-settings-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: 1px solid var(--muted);
    border-radius: 4px;
    /* color: var(--muted); */
    color: ghostwhite;
    cursor: pointer;
    padding: 2px 5px;
    transition: border-color .2s, color .2s;
    line-height: 1;
    cursor: pointer;
  }
  .alert-settings-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .alert-settings-btn.active {
    /* border-color: var(--up); */
    /* color: var(--up); */
    border-color: darkgray;
    color: ghostwhite;
  }

  /* ── Section label ── */
  .section-label {
    font-family: var(--mono);
    font-size: .65rem;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 20px 0 10px;
  }

  /* ── Loading skeleton ── */
  .skeleton {
    height: 14px;
    background: linear-gradient(90deg, var(--border) 25%, var(--muted) 50%, var(--border) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 3px;
    margin: 8px 0;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }

  /* ── Error state ── */
  .error-text {
    font-family: var(--mono);
    /*font-size: .75rem;*/
    color: var(--down);
    opacity: .7;
  }

  /* ── Update time ── */
  .update-time {
    font-family: var(--mono);
    font-size: .68rem;
    color: var(--muted);
    margin-top: 12px;
    text-align: right;
  }

  /* ── CNBC card spans full width on wide screens ── */
  .card-wide {
    grid-column: 1 / -1;
  }
  @media (max-width: 680px) {
    .card-wide { grid-column: auto; }
  }

/* ── Slide Menu ── */
#menuOverlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  z-index: 200;
}
#menuOverlay.active { display: block; }

#slideMenu {
  position: fixed;
  top: 0;
  left: -280px;
  width: 280px;
  height: 100vh;
  background: var(--surface);
  border-right: 1px solid var(--border);
  z-index: 300;
  transition: left .3s ease;
  overflow-y: auto;
}
#slideMenu.active { left: 0; }

#menuHeader {
  font-family: var(--mono);
  font-size: .9rem;
  font-weight: 600;
  color: var(--accent);
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  letter-spacing: .12em;
}

#menuList {
  list-style: none;
  padding: 12px 0;
}
#menuList li a {
  display: block;
  padding: 12px 20px;
  color: var(--text);
  text-decoration: none;
  font-size: .88rem;
  transition: background .15s, color .15s;
}
#menuList li a:hover {
  background: var(--border);
  color: var(--accent);
}
</style>

<link rel="manifest" href="/stock/manifest.json">
<meta name="theme-color" content="#0a0e14">
<meta name="mobile-web-app-capable" content="yes"> <!-- Android Chrome -->
<meta name="apple-mobile-web-app-capable" content="yes"> <!-- iOS Safari，舊版仍需要 -->
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="即時報價">
<link rel="apple-touch-icon" href="/stock/icon-192.png">
<link rel="icon" href="/stock/favicon.ico" type="image/x-icon">

</head>
<body>

<!-- Overlay 背景遮罩 -->
<div id="menuOverlay" onclick="closeMenu()"></div>

<!-- Slide Menu -->
<nav id="slideMenu">
  <div id="menuHeader">&#9632; 即時報價</div>
  <ul id="menuList">
    <li><a href="/stock/index.html">📊 即時報價</a></li>
    <li><a href="#" onclick="closeMenu()">⚙️ 設定</a></li>
  </ul>
</nav>

<header>
  <h1 onclick="openMenu()" style="cursor:pointer;">☰ 即時報價</h1>
  <div style="display:flex;align-items:center;gap:16px;">
    <span id="clock">--:--:--</span>
    <button id="refreshBtn" onclick="loadAll()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      <!--重新整理 --><span id="countdown">300</span>
    </button>
    <button id="subscribeUser" onclick="subscribeUser()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" id="subscribeIcon">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <!--訂閱通知 --><span id="">&nbsp;</span>
    </button>
  </div>
</header>

<div class="grid" id="grid">
  <div class="card" id="card-tw"><div class="card-title">台股市場概況</div><div class="skeleton"></div><div class="skeleton"></div></div>
  <div class="card" id="card-cnbc"><div class="card-title">美股市場概況</div><div class="skeleton"></div><div class="skeleton"></div></div>
  <div class="card" id="card-commodity"><div class="card-title">原物料市場</div><div class="skeleton"></div></div>
  <div class="card" id="card-sentiment"><div class="card-title">市場情緒</div><div class="skeleton"></div></div>
  <div class="card" id="card-rh"><div class="card-title">台積電 ADR</div><div class="skeleton"></div></div>
</div>

<script>

// 警示閾值 localStorage 工具
const ALERT_PREFIX = 'alert_';

function alertGet(key) {
  const val = localStorage.getItem(ALERT_PREFIX + key);
  return val !== null ? parseFloat(val) : null;
}

function alertSet(key, value) {
  if (value === '' || value === null || isNaN(value)) {
    localStorage.removeItem(ALERT_PREFIX + key);
  } else {
    localStorage.setItem(ALERT_PREFIX + key, String(value));
  }
}

function alertEnabled(key) {
  return alertGet(key) !== null;
}

// group-header HTML 產生器（含偵測設定按鈕）
// settingsKey：若傳入則顯示齒輪按鈕，點擊呼叫 openAlertSettings(settingsKey)
function groupHeader(label, settingsKey = null) {
  const isActive = settingsKey && (alertEnabled(settingsKey + '_high') || alertEnabled(settingsKey + '_low') || alertEnabled(settingsKey));
  const btnHtml = settingsKey ? `
    <button class="alert-settings-btn ${isActive ? 'active' : ''}"
      title="偵測設定"
      onclick="openAlertSettings('${settingsKey}')">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>` : '';
  return `<span class="group-header"><span class="group-header-title">${label}</span>${btnHtml}</span>`;
}

// 偵測設定彈窗
// config 格式：{ title, fields: [{ key, label, placeholder, unit }] }
const ALERT_CONFIGS = {
  tsmc: {
    title: '台積電 偵測設定',
    fields: [
      { key: 'tsmc_high', label: '價格高於此值時通知', placeholder: '例：2000', unit: 'TWD' },
      { key: 'tsmc_low',  label: '價格低於此值時通知', placeholder: '例：1800',  unit: 'TWD' },
    ]
  },
  brent: {
    title: '布蘭特原油 偵測設定',
    fields: [
      { key: 'brent_high', label: '價格高於此值時通知', placeholder: '例：100', unit: 'USD' },
      { key: 'brent_low',  label: '價格低於此值時通知', placeholder: '例：95',  unit: 'USD' },
    ]
  },
  usdollar: {
    title: '美元指數 偵測設定',
    fields: [
      { key: 'usdollar_high', label: '價格高於此值時通知', placeholder: '例：100', unit: '' },
      { key: 'usdollar_low',  label: '價格低於此值時通知', placeholder: '例：99',  unit: '' },
    ]
  },
  vix: {
    title: 'VIX 恐慌指數 偵測設定',
    fields: [
      { key: 'vix_high', label: '指數高於此值時通知', placeholder: '例：30', unit: '' },
      { key: 'vix_low',  label: '指數低於此值時通知', placeholder: '例：25', unit: '' },
    ]
  }
};

async function openAlertSettings(configKey) {
  const config = ALERT_CONFIGS[configKey];
  if (!config) return;

  // 動態產生表單 HTML
  const fieldsHtml = config.fields.map(f => {
    const currentVal = alertGet(f.key);
    return `
      <div style="margin-bottom:14px; text-align:left;">
        <label style="display:block; font-size:.8rem; color:#aaa; margin-bottom:5px;">${f.label}</label>
        <div style="display:flex; align-items:center; gap:8px;">
          <input
            id="swal-field-${f.key}"
            type="number"
            step="0.01"
            placeholder="${f.placeholder}"
            value="${currentVal !== null ? currentVal : ''}"
            style="
              flex:1;
              background:#1a2130;
              border:1px solid #2e3f52;
              border-radius:4px;
              color:#c8d8e8;
              font-size:.9rem;
              padding:7px 10px;
              outline:none;
            "
          />
          <span style="color:#5a7080; font-size:.8rem; min-width:30px;">${f.unit}</span>
          <button
            type="button"
            onclick="document.getElementById('swal-field-${f.key}').value=''"
            title="清除"
            style="
              background:none;
              border:1px solid #3a4a5c;
              border-radius:4px;
              color:#5a7080;
              cursor:pointer;
              padding:5px 8px;
              font-size:.75rem;
              transition: border-color .2s, color .2s;
            "
            onmouseover="this.style.borderColor='#ff4d6a'; this.style.color='#ff4d6a';"
            onmouseout="this.style.borderColor='#3a4a5c'; this.style.color='#5a7080';"
          >清除</button>
        </div>
      </div>`;
  }).join('');

  const result = await Swal.fire({
    title: config.title,
    html: `
      <div style="font-size:.75rem; color:#5a7080; margin-bottom:16px;">留空或清除表示停用該項偵測</div>
      ${fieldsHtml}
    `,
    background: '#111620',
    color: '#c8d8e8',
    confirmButtonText: '儲存',
    confirmButtonColor: '#0d6efd',
    cancelButtonText: '取消',
    showCancelButton: true,
    cancelButtonColor: '#3a4a5c',
    focusConfirm: false,
    preConfirm: () => {
      const values = {};
      for (const f of config.fields) {
        const el = document.getElementById('swal-field-' + f.key);
        values[f.key] = el ? el.value.trim() : '';
      }
      return values;
    }
  });

  if (!result.isConfirmed) return;

  // 儲存至 localStorage
  for (const f of config.fields) {
    const val = result.value[f.key];
    alertSet(f.key, val === '' ? null : parseFloat(val));
  }

  Swal.fire({
    icon: 'success',
    title: '已儲存',
    text: "偵測設定已更新，點確定立刻載入最新資料",
    showCancelButton: true,
    background: '#111620',
    color: '#c8d8e8',
    confirmButtonText: '確定',
    cancelButtonText: '取消'
  }).then((result) => {
    if (result.isConfirmed) {
      location.reload();
    }
  });
}

async function sendNotification(title, body, url = '/stock/index.html') {
  // 確認有通知權限
  if (Notification.permission !== 'granted') return;

  const isAndroid = /Android/i.test(navigator.userAgent);

  const reg = await navigator.serviceWorker.ready;
  reg.showNotification(title, {
    body: body,           // 通知內文
    icon: '/stock/icon-512.png',    // 通知圖示（大圖）
    badge: '/stock/icon-192.png',  // 狀態列小圖示（Android）
    // image: '/stock/banner.png', // 通知內的橫幅大圖
    tag: title,   // 同 tag 的通知會互相取代，避免洗版
    renotify: true,       // tag 相同時是否還要震動提醒
    silent: false,        // 是否靜音
    vibrate: [200, 100, 200], // 震動模式（Android）
    actions: isAndroid ? [] : [ // 通知上的快捷按鈕
      { action: 'view', title: '查看詳情' },
      { action: 'dismiss', title: '忽略' },
    ],
    data: { url: url }, // 把目標網址存進去
  });
}

// 將訂閱邏輯封裝成一個函數
async function subscribeUser() {
  if (!('serviceWorker' in navigator)) {
    const replyMessage = '您的瀏覽器不支援 Service Worker';
    showSweetAlert('error', '發生錯誤', replyMessage);
    await writeLogs('ERROR', replyMessage);
    return;
  }

  try {
    // 確保 SW 已啟動
    const reg = await navigator.serviceWorker.ready;

    // iOS 偵測與提醒
    const isStandalone = window.navigator.standalone === true;
    if (!isStandalone && /iPhone|iPad|iPod/.test(navigator.userAgent)) {
      const replyMessage = 'iOS 必須先「加入主畫面」成為 PWA 才能開啟通知！';
      showSweetAlert('error', '發生錯誤', replyMessage);
      await writeLogs('ERROR', replyMessage);
      return;
    }
    
    // 請求通知權限
    const permission = await Notification.requestPermission();
    const replyMessage = '[SW] 通知權限：' + permission;
    showSweetAlert('info', '通知權限', replyMessage);
    await writeLogs('INFO', replyMessage);
  
    if (permission !== 'granted') {
      const replyMessage = '權限被拒絕，請至「設定 > 通知 > 即時報價」手動開啟';
      showSweetAlert('error', '發生錯誤', replyMessage);
      await writeLogs('ERROR', replyMessage);
      return;
    }

    if (permission === 'granted') {
      document.getElementById("subscribeIcon").style.fill = "aliceblue";
    }

    // 訂閱 Web Push
    const VAPID_PUBLIC_KEY = 'BNKIWkZVpBlLD1R1i7eU7ZhtS-W7X5wI_v84v_rGOGBRvAKO999c1DssgaBvVRI2y5w2SkUx62upF8hs34PicbA';

    let subscription;
    try {
      subscription = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
      });
      const replyMessage = '訂閱成功：' + subscription.endpoint.substring(0, 50);
      showSweetAlert('info', '訂閱狀態', replyMessage);
      await writeLogs('PUSH', replyMessage);
    } catch (e) {
      const replyMessage = '訂閱失敗：' + e.message;
      showSweetAlert('error', '發生錯誤', replyMessage);
      await writeLogs('SW', replyMessage);
      return;
    }

    try {
      // 把 subscription 傳給 Worker 時，順便帶上 User-Agent
      await fetch('https://billowing-queen-4a58.bau720123.workers.dev/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          ...subscription.toJSON(),
          userAgent: navigator.userAgent
        })
      });
      const replyMessage = 'Push 訂閱完成，已傳送到 Worker';
      showSweetAlert('info', '訂閱狀態', replyMessage);
      await writeLogs('SW', replyMessage);
    } catch (e) {
      const replyMessage = '傳送到 Worker 失敗：' + e.message;
      showSweetAlert('error', '發生錯誤', replyMessage);
      await writeLogs('ERROR', replyMessage);
    }
  } catch (err) {
    const replyMessage = '例外失敗：' + err;
    showSweetAlert('error', '發生錯誤', replyMessage);
    await writeLogs('ERROR', replyMessage);
  }
}

// Service Worker 註冊
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/stock/sw.js')
      .then(async reg => {
        const replyMessage = '註冊成功：' + reg.scope;
        showSweetAlert('info', '註冊狀態', replyMessage);
        await writeLogs('SW', replyMessage);

        // 先檢查 Notification 是否存在
        if (typeof Notification === 'undefined') {
          const replyMessage = '此環境不支援通知功能';
          showSweetAlert('error', '發生錯誤', replyMessage);
          await writeLogs('ERROR', replyMessage);
          return;
        }

        // 檢查通知權限

// VAPID 公鑰轉換工具函數
function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
}

function changeClass(val, reverse = 0) {
  if (!val) return '';
  const s = String(val);
  
  let isUp = s.includes('▲') || s.includes('+') || s > 0;
  let isDown = s.includes('▼') || s.includes('-') || s < 0;

  if (!isUp && !isDown) return '';

  // 如果 reverse 為 1，則將 isUp 與 isDown 對調
  if (reverse === 1) {
    [isUp, isDown] = [isDown, isUp];
  }

  return isUp ? 'up' : 'down';
}

function formatChange(val) {
  if (typeof val === 'number') return (val > 0 ? '+' : '') + val.toFixed(2);
  return val;
}

function row(label, value = '', cls = '') {
  return `<div class="row"><span class="row-label">${label}</span><span class="row-value ${cls}">${value}</span></div>`;
}

function setCard(id, updown, html) {
  const card = document.getElementById(id);

}

const REFRESH_INTERVAL = 300; // 秒，改這個就通吃
let _countdownTimer = null;

function startCountdown() {
  clearInterval(_countdownTimer);
  let count = REFRESH_INTERVAL;
  document.getElementById('countdown').textContent = count;

  _countdownTimer = setInterval(() => {
    count--;
    document.getElementById('countdown').textContent = count;
    if (count <= 0) {
      clearInterval(_countdownTimer);
      loadAll();
    }
  }, 1000);
}

async function writeLogs(tag, message) {
  try {
    await fetch(`${WORKER}/write-logs`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tag, message })
    });
  } catch (e) {
    // log 失敗不影響主流程
  }
}

function showSweetAlert(icon = 'info', title = '', text = '') {
  Swal.fire({
    icon: icon,
    title: title,
    text: text,
    confirmButtonText: '確定',
    confirmButtonColor: '#0d6efd'
  });
}

function openMenu() {
  document.getElementById('slideMenu').classList.add('active');
  document.getElementById('menuOverlay').classList.add('active');
  document.body.style.overflow = 'hidden'; // ← 禁止 body 滾動
}

function closeMenu() {
  document.getElementById('slideMenu').classList.remove('active');
  document.getElementById('menuOverlay').classList.remove('active');
  document.body.style.overflow = ''; // ← 恢復 body 滾動
}
</script>
</body>
</html>
