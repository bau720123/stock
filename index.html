<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>即時報價</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+TC:wght@400;500;700&display=swap');

  :root {
    --bg:       #0a0e14;
    --surface:  #111620;
    --border:   #1e2736;
    --muted:    #3a4a5c;
    --text:     #c8d8e8;
    --dim:      #5a7080;
    --up:       #00c98a;
    --down:     #ff4d6a;
    --neutral:  #5a9eff;
    --accent:   #f0b429;
    --mono:     'IBM Plex Mono', monospace;
    --sans:     'Noto Sans TC', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 80px 16px 48px;
  }

  /* ── Header ── */
  header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: var(--bg);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 16px 16px;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-family: var(--mono);
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
  }
  #clock {
    font-family: var(--mono);
    font-size: .8rem;
    color: var(--dim);
    letter-spacing: .06em;
  }

  /* ── Refresh button ── */
  #refreshBtn, #subscribeUser {
    display: flex;
    align-items: center;
    gap: 8px;
    background: none;
    border: 1px solid var(--muted);
    /* color: var(--dim); */
    color: aqua;
    font-family: var(--mono);
    font-size: .75rem;
    letter-spacing: .08em;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: border-color .2s, color .2s;
    border-color: aqua;
    background-color: black;
  }
  #refreshBtn:hover, #subscribeUser:hover { border-color: var(--accent); color: var(--accent); }
  #refreshBtn.spinning svg { animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Grid layout ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity .4s ease, transform .4s ease, border-color .2s;
  }
  .card.loaded { opacity: 1; transform: translateY(0); }
  .card:hover { border-color: var(--muted); }

  /* left accent bar */
  .card::before {
    content: '';
    position: absolute;
    left: 0; top: 16px; bottom: 16px;
    width: 3px;
    border-radius: 0 2px 2px 0;
    background: var(--neutral);
  }
  /* .card.up::before   { background: var(--up); }
  .card.down::before { background: var(--down); } */
  .card.up::before   { background: var(--neutral); }
  .card.down::before { background: var(--neutral); }

  .card-title {
    font-family: var(--mono);
    font-size: .7rem;
    letter-spacing: .14em;
    text-transform: uppercase;
    /* color: var(--dim); */
    margin-bottom: 14px;
  }

  /* ── Rows inside card ── */
  .row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
  }
  .row:last-child { border-bottom: none; }
  .row-label {
    font-size: .78rem;
    color: var(--dim);
  }
  .row-value {
    font-family: var(--mono);
    font-size: .88rem;
    color: var(--text);
  }
  .row-value.up   { color: var(--up); }
  .row-value.down { color: var(--down); }
  .row-value.accent { color: var(--accent); font-size: 1.1rem; font-weight: 600; }
  
  .group-header {
    font-size: 0.82rem;
    font-weight: 700;
    /* color: var(--text); */
    color: tan;
    margin: 14px 0 6px;
    display: block;
  }

  /* ── Section label ── */
  .section-label {
    font-family: var(--mono);
    font-size: .65rem;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 20px 0 10px;
  }

  /* ── Loading skeleton ── */
  .skeleton {
    height: 14px;
    background: linear-gradient(90deg, var(--border) 25%, var(--muted) 50%, var(--border) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 3px;
    margin: 8px 0;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }

  /* ── Error state ── */
  .error-text {
    font-family: var(--mono);
    /*font-size: .75rem;*/
    color: var(--down);
    opacity: .7;
  }

  /* ── Update time ── */
  .update-time {
    font-family: var(--mono);
    font-size: .68rem;
    color: var(--muted);
    margin-top: 12px;
    text-align: right;
  }

  /* ── CNBC card spans full width on wide screens ── */
  .card-wide {
    grid-column: 1 / -1;
  }
  @media (max-width: 680px) {
    .card-wide { grid-column: auto; }
  }
</style>

<script>
async function sendNotification(title, body, url = '/stock/index.html') {
  // 確認有通知權限
  if (Notification.permission !== 'granted') return;

  const isAndroid = /Android/i.test(navigator.userAgent);

  const reg = await navigator.serviceWorker.ready;
  reg.showNotification(title, {
    body: body,           // 通知內文
    icon: '/stock/icon-512.png',    // 通知圖示（大圖）
    badge: '/stock/icon-192.png',  // 狀態列小圖示（Android）
    // image: '/stock/banner.png', // 通知內的橫幅大圖
    tag: title,   // 同 tag 的通知會互相取代，避免洗版
    renotify: true,       // tag 相同時是否還要震動提醒
    silent: false,        // 是否靜音
    vibrate: [200, 100, 200], // 震動模式（Android）
    actions: isAndroid ? [] : [ // 通知上的快捷按鈕
      { action: 'view', title: '查看詳情' },
      { action: 'dismiss', title: '忽略' },
    ],
    data: { url: url }, // 把目標網址存進去
  });
}

// 將訂閱邏輯封裝成一個函數
async function subscribeUser() {
  if (!('serviceWorker' in navigator)) {
    const replyMessage = '您的瀏覽器不支援 Service Worker';
    showSweetAlert('error', '發生錯誤', replyMessage);
    await writeLogs('ERROR', replyMessage);
    return;
  }

  try {
    // 確保 SW 已啟動
    const reg = await navigator.serviceWorker.ready;

    // iOS 偵測與提醒
    const isStandalone = window.navigator.standalone === true;
    if (!isStandalone && /iPhone|iPad|iPod/.test(navigator.userAgent)) {
      const replyMessage = 'iOS 必須先「加入主畫面」成為 PWA 才能開啟通知！';
      showSweetAlert('error', '發生錯誤', replyMessage);
      await writeLogs('ERROR', replyMessage);
      return;
    }
    
    // 請求通知權限
    const permission = await Notification.requestPermission();
    const replyMessage = '[SW] 通知權限：' + permission;
    showSweetAlert('info', '通知權限', replyMessage);
    await writeLogs('INFO', replyMessage);
  
    if (permission !== 'granted') {
      const replyMessage = '權限被拒絕，請至「設定 > 通知 > 即時報價」手動開啟';
      showSweetAlert('error', '發生錯誤', replyMessage);
      await writeLogs('ERROR', replyMessage);
      return;
    }

    if (permission === 'granted') {
      document.getElementById("subscribeIcon").style.fill = "aliceblue";
    }

    // 訂閱 Web Push
    const VAPID_PUBLIC_KEY = 'BNKIWkZVpBlLD1R1i7eU7ZhtS-W7X5wI_v84v_rGOGBRvAKO999c1DssgaBvVRI2y5w2SkUx62upF8hs34PicbA';

    let subscription;
    try {
      subscription = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
      });
      const replyMessage = '訂閱成功：' + subscription.endpoint.substring(0, 50);
      showSweetAlert('info', '訂閱狀態', replyMessage);
      await writeLogs('PUSH', replyMessage);
    } catch (e) {
      const replyMessage = '訂閱失敗：' + e.message;
      showSweetAlert('error', '發生錯誤', replyMessage);
      await writeLogs('SW', replyMessage);
      return;
    }

    try {
      // 把 subscription 傳給 Worker 時，順便帶上 User-Agent
      await fetch('https://billowing-queen-4a58.bau720123.workers.dev/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          ...subscription.toJSON(),
          userAgent: navigator.userAgent
        })
      });
      const replyMessage = 'Push 訂閱完成，已傳送到 Worker';
      showSweetAlert('info', '訂閱狀態', replyMessage);
      await writeLogs('SW', replyMessage);
    } catch (e) {
      const replyMessage = '傳送到 Worker 失敗：' + e.message;
      showSweetAlert('error', '發生錯誤', replyMessage);
      await writeLogs('ERROR', replyMessage);
    }
  } catch (err) {
    const replyMessage = '例外失敗：' + err;
    showSweetAlert('error', '發生錯誤', replyMessage);
    await writeLogs('ERROR', replyMessage);
  }
}

// Service Worker 註冊
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/stock/sw.js')
      .then(async reg => {
        const replyMessage = '註冊成功：' + reg.scope;
        showSweetAlert('info', '註冊狀態', replyMessage);
        await writeLogs('SW', replyMessage);

        // 先檢查 Notification 是否存在
        if (typeof Notification === 'undefined') {
          const replyMessage = '此環境不支援通知功能';
          showSweetAlert('error', '發生錯誤', replyMessage);
          await writeLogs('ERROR', replyMessage);
          return;
        }

        // 檢查通知權限
        if (Notification.permission === 'granted') {
          document.getElementById("subscribeIcon").style.fill = "aliceblue";
        }
      })
      .catch(async err => {
        const replyMessage = '註冊失敗：' + err;
        showSweetAlert('error', '發生錯誤', replyMessage);
        await writeLogs('ERROR', replyMessage);
      });
  });
}

// VAPID 公鑰轉換工具函數
function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
}

const WORKER = "https://billowing-queen-4a58.bau720123.workers.dev";
let tsmCnbcData = null; // 用於跨卡片共享資料

// 系統即時時間顯示
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('zh-TW', { hour24: false });
}
setInterval(updateClock, 1000);
updateClock();

function changeClass(val, reverse = 0) {
  if (!val) return '';
  const s = String(val);
  
  let isUp = s.includes('▲') || s.includes('+') || s > 0;
  let isDown = s.includes('▼') || s.includes('-') || s < 0;

  if (!isUp && !isDown) return '';

  // 如果 reverse 為 1，則將 isUp 與 isDown 對調
  if (reverse === 1) {
    [isUp, isDown] = [isDown, isUp];
  }

  return isUp ? 'up' : 'down';
}

function formatChange(val) {
  if (typeof val === 'number') return (val > 0 ? '+' : '') + val.toFixed(2);
  return val;
}

function row(label, value, cls = '') {
  return `<div class="row"><span class="row-label">${label}</span><span class="row-value ${cls}">${value}</span></div>`;
}

function setCard(id, updown, html) {
  const card = document.getElementById(id);
  card.className = 'card ' + (updown > 0 ? 'up' : updown < 0 ? 'down' : '');
  card.innerHTML = html;
  setTimeout(() => card.classList.add('loaded'), 20);
}

async function loadAll() {
  if (typeof Notification !== 'undefined' && Notification.permission === 'default') {
    Notification.requestPermission();
  }

  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');

  // 重置為 skeleton
  document.querySelectorAll('.card').forEach(c => {
    c.className = 'card';
    // c.innerHTML = c.querySelector('.card-title')?.outerHTML ||
    //   '<div class="skeleton"></div>';
    // const sk = document.createElement('div');
    // sk.className = 'skeleton';
    // sk.style.width = '60%';
    // c.appendChild(sk);
  });

  // 1. 先跑 CNBC 以取得 TSM 資料
  await loadCnbc();

  // 2. 跑其餘 API
  await Promise.allSettled([
    loadTW(),
    loadCommodity(),
    loadSentiment(),
    loadRH(),
  ]);

  btn.classList.remove('spinning');
  startCountdown();

  if (Notification.permission === 'granted') {
    document.getElementById("subscribeIcon").style.fill = "aliceblue";
  }
}

window.onload = loadAll;

// 美股市場：合併盤前與四大指數
async function loadCnbc() {
  const d = await fetch(WORKER + '/cnbc').then(r => r.json());
  if (!d.success) return;

  const { market: m, fairValue: fv } = d;
  tsmCnbcData = m; // 存下台積電的部分給 loadRH

  let html = `<div class="card-title">美股市場概況</div>`;
  
  html += `<span class="group-header">【美股盤前電子盤】</span>`;
  html += row('道瓊期貨', formatChange(fv.dow), changeClass(fv.dow));
  html += row('標普500期貨', formatChange(fv.sp), changeClass(fv.sp));
  html += row('納斯達克100期貨', formatChange(fv.nasdaq), changeClass(fv.nasdaq));
  html += row('羅素2000期貨', formatChange(fv.russell), changeClass(fv.russell));

  html += `<span class="group-header">【美股四大指數】</span>`;
  html += row('道瓊工業指數', m.dji, changeClass(m.dji));
  html += row('標普500指數', m.spx, changeClass(m.spx));
  html += row('納斯達克指數', m.ixic, changeClass(m.ixic));
  html += row('費城半導體指數', m.sox, changeClass(m.sox));

  // html += `<div class="update-time">${fv.updateTime}</div>`;
  setCard('card-cnbc', 0, html);
}

// 台股市場概況
async function loadTW() {
  const [taifex, fitx, twn] = await Promise.all([
    fetch(WORKER + '/taifex').then(r => r.json()),
    fetch(WORKER + '/fitx').then(r => r.json()),
    fetch(WORKER + '/twn').then(r => r.json()),
  ]);

  let html = `<div class="card-title">台股市場概況</div>`;

  // 【台積電期貨】
  html += `<span class="group-header">【台積電期貨】</span>`;
  if (taifex.success && taifex.price > 0) {
    const sign = taifex.updown > 0 ? '▲' : taifex.updown < 0 ? '▼' : '';
    var cls = 'up';
    if (taifex.updown > 0) cls = 'down';
    html += row('現價', taifex.price.toFixed(1), 'accent');
    html += row('漲跌', sign + Math.abs(taifex.updown).toFixed(0), cls);
  } else {
    html += `<div class="error-text">無法取得資料</div>`;
  }

  // 【台股期貨】
  html += `<span class="group-header">【台股期貨】</span>`;
  if (fitx.success) {
    const cls = changeClass(fitx.changeText, 1);
    const formattedTime = fitx.updateTime.replace(/\./g, '-');
    html += row('開盤', fitx.open.toFixed(0));
    html += row('最高', fitx.high.toFixed(0));
    html += row('最低', fitx.low.toFixed(0));
    html += row('漲跌', fitx.changeText, cls);
    html += row('成交', fitx.current.toFixed(2), 'accent');
    html += row('更新時間', formattedTime);
  } else {
    html += `<div class="error-text">無法取得資料</div>`;
  }

  // 【富台指】
  html += `<span class="group-header">【富台指】</span>`;
  if (twn.success) {
    const cls = changeClass(twn.changeText, 1);
    const formattedTime = twn.updateTime.replace(/\./g, '-');
    html += row('開盤', twn.open.toFixed(0));
    html += row('最高', twn.high.toFixed(0));
    html += row('最低', twn.low.toFixed(0));
    html += row('漲跌', twn.changeText, cls);
    html += row('成交', twn.current.toFixed(2), 'accent');
    html += row('更新時間', formattedTime);
  } else {
    html += `<div class="error-text">無法取得資料</div>`;
  }

  setCard('card-tw', 0, html);
}

const REFRESH_INTERVAL = 60; // 秒，改這個就通吃
let _countdownTimer = null;

function startCountdown() {
  clearInterval(_countdownTimer);
  let count = REFRESH_INTERVAL;
  document.getElementById('countdown').textContent = count;

  _countdownTimer = setInterval(() => {
    count--;
    document.getElementById('countdown').textContent = count;
    if (count <= 0) {
      clearInterval(_countdownTimer);
      loadAll();
    }
  }, 1000);
}

async function writeLogs(tag, message) {
  try {
    await fetch(`${WORKER}/write-logs`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tag, message })
    });
  } catch (e) {
    // log 失敗不影響主流程
  }
}

function showSweetAlert(icon = 'info', title = '', text = '') {
  Swal.fire({
    icon: icon,
    title: title,
    text: text,
    confirmButtonText: '確定',
    confirmButtonColor: '#0d6efd'
  });
}
